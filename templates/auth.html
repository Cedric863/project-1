<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIDS Authentication</title>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-container { background: #1e293b; padding: 40px; border-radius: 8px; width: 350px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { color: #38bdf8; text-align: center; margin-top: 0; margin-bottom: 20px; }
        .status-text { text-align: center; color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px; }
        .error-message { background: rgba(239, 68, 68, 0.2); color: #ef4444; padding: 10px; border-radius: 4px; text-align: center; margin-bottom: 15px; font-weight: bold; border: 1px solid #ef4444; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; background: #0f172a; border: 1px solid #334155; color: #e2e8f0; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #38bdf8; border: none; color: #0f172a; font-weight: bold; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0ea5e9; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h2>🛡️ Zetech NIDS</h2>
        
        {% if error %}
            <div class="error-message">{{ error }}</div>
        {% endif %}

        {% if mode == 'register' %}
            <div class="status-text">SYSTEM UNINITIALIZED<br>Create the Master Administrator account.</div>
            <form method="POST">
                <input type="text" name="username" placeholder="New Admin Username" required autocomplete="off">
                <input type="password" name="password" placeholder="New Secure Password" required>
                <button type="submit">INITIALIZE SYSTEM</button>
            </form>
        {% else %}
            <div class="status-text">SYSTEM LOCKED<br>Enter administrator credentials.</div>
            <form method="POST">
                <input type="text" name="username" placeholder="Username" required autocomplete="off">
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">AUTHENTICATE</button>
            </form>
        {% endif %}
    </div>
</body>
</html>
